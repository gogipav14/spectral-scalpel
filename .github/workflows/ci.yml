# Continuous-integration matrix for spectral-scalpel.
#
# Three matrices run on push and on pull_request:
#   - unit-tests: NumPy-only path, all supported Python versions, three OSes.
#   - backend-tests: per-backend extras (PyTorch, JAX), Linux only, latest Python.
#   - reproducibility-spot-check: runs reproducibility/reproduce.sh in CPU mode
#     against a small subset of the manuscript figures to detect regressions
#     within hours of a code change.
#
# GPU paths are documented but not exercised in CI (no GPU-enabled GitHub
# runner). They are validated locally on the RTX 5060 development workstation
# and the wall-clock numbers in reproducibility/data/benchmark_multi_backend.csv
# are the GPU baseline.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly cron to catch upstream dependency drift.
    - cron: '0 12 * * 1'

jobs:
  unit-tests:
    name: pytest (numpy-only) ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (numpy-only)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit tests
        run: |
          pytest -q --tb=short

  backend-tests:
    name: pytest (backend=${{ matrix.backend }}) ${{ matrix.os }} py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11']
        backend: [torch, jax]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install with ${{ matrix.backend }} extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,${{ matrix.backend }}]"
      - name: Run backend tests
        run: |
          pytest -q -k "${{ matrix.backend }} or expansion" --tb=short

  reproducibility-spot-check:
    name: reproduce.sh (CPU only)
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install full
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,torch,jax]"
      - name: Run reproduction script (CPU-only)
        env:
          ENABLE_GPU: '0'
          ENABLE_JULIA: '0'
          TOLERANCE: '0.20'   # CI runners are noisy; widen tolerance vs local
        run: |
          # Run the spot-check and let it fail loudly if reproduce.sh
          # itself errors out or csv_diff finds rows outside tolerance.
          # The TOLERANCE knob (above) is the lever for runner noise.
          bash reproducibility/reproduce.sh
      - name: Upload regenerated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repro-artifacts
          path: |
            reproducibility/regen/
            reproducibility/figures/
          if-no-files-found: ignore

  lint:
    name: lint and type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
      - name: Ruff
        run: ruff check scalpel tests
      - name: Mypy (informational, non-blocking)
        run: mypy scalpel || true
